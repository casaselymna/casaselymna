</style>

/* ============================================================

const key=(a,b)=>a<=b?a+"-"+b:b+"-"+a;
const dist=(a,b)=>{const d=Math.abs(a-b);return Math.min(d,12-d);};
const atom=(a,b)=>R[key(a,b)].s;                 // puntaje atómico signo×signo
const avg=(x,y)=>(x+y)/2;

function tierOf(s){
  if(s>=82) return {label:"Armonía",col:"var(--jade)",hex:"#6fa893",k:"armonia"};
  if(s>=66) return {label:"Magnetismo",col:"var(--gold)",hex:"#c9a24b",k:"magnetismo"};
  if(s>=58) return {label:"Contraste",col:"var(--amethyst)",hex:"#9b7fb8",k:"contraste"};
  return     {label:"Desafío",col:"var(--rust)",hex:"#c2674a",k:"desafio"};
}
function elementRelation(a,b){
  const A=SIGNS[a].el,B=SIGNS[b].el;
  if(A===B) return "Elementos gemelos";
  const comp=(x,y)=>(["Fuego","Aire"].includes(x)&&["Fuego","Aire"].includes(y))||(["Tierra","Agua"].includes(x)&&["Tierra","Agua"].includes(y));
  return comp(A,B)?"Elementos cómplices":"Elementos rivales";
}
const round=x=>Math.round(x);
// elección determinista de variante (sin azar, reproducible)
const pick=(arr,seed)=>arr[seed%arr.length];

/* puntaje compuesto por nivel */
function composite(P,level){
  // P = {a:{sol,asc,ven}, b:{sol,asc,ven}}
  const solScore = atom(P.a.sol,P.b.sol);
  if(level===1) return {total:solScore, sol:solScore};

  const ascScore = atom(P.a.asc,P.b.asc);
  const crossSA  = avg(atom(P.a.sol,P.b.asc), atom(P.a.asc,P.b.sol));
  if(level===2){
    const total = round(0.55*solScore + 0.30*ascScore + 0.15*crossSA);
    return {total, sol:solScore, asc:ascScore};
  }
  // nivel 3
  const venScore = atom(P.a.ven,P.b.ven);
  const crossSV  = avg(atom(P.a.sol,P.b.ven), atom(P.a.ven,P.b.sol));
  const venComp  = round(0.6*venScore + 0.4*crossSV);
  const total    = round(0.35*solScore + 0.25*ascScore + 0.40*venComp);
  return {total, sol:solScore, asc:ascScore, ven:venScore};
}

function buildReco(layers){ // layers: [{k:'sol',s:..},...]
  const sorted=[...layers].sort((x,y)=>y.s-x.s);
  const max=sorted[0], min=sorted[sorted.length-1];
  let sintesis, reco;

  if(min.s>=STRONG){
    sintesis="Las capas se alinean todas a su favor: fondo, piel y deseo empujan en la misma dirección. Pocos encuentros arrancan con tanto cielo despejado.";
    reco="Disfrútenlo sin sobreanalizarlo. El único riesgo de una pareja tan favorecida es no darse cuenta de la suerte que tienen — y dejarla enfriar por costumbre.";
  } else if(max.s<FRAGILE){
    sintesis="Ninguna capa les facilita el camino: ni el fondo, ni la piel, ni el deseo se entregan solos. Este amor sería una elección valiente más que una evidencia.";
    reco="Si lo eligen, que sea con los ojos abiertos: aquí nada es automático y todo se construye. "+CUIDADO[min.k];
  } else {
    sintesis=`Lo más sólido de este vínculo es ${NAME[max.k]}; lo más frágil, ${NAME[min.k]}. El equilibrio entre ambos define la historia.`;
    reco=APOYO[max.k]+" "+CUIDADO[min.k];
  }
  return {sintesis,reco};
}

    if(dash)c.setAttribute("stroke-dasharray",dash);svg.appendChild(c);};
  ring(150,"#2b3447",1); ring(112,"#202838",1,"2 5");

  const pos=i=>{const ang=(-90+i*30)*Math.PI/180;return{x:cx+rGlyph*Math.cos(ang),y:cy+rGlyph*Math.sin(ang)};};
  const lit=new Set();

  // una línea por capa activa (A↔B de la misma capa), color por capa
  layers.forEach(k=>{
    const ia=A[k], ib=B[k];
    lit.add(ia); lit.add(ib);
    const pa=pos(ia), pb=pos(ib), col=LAYER_META[k].hex;
    if(ia!==ib){
      const halo=document.createElementNS(ns,"line");
      halo.setAttribute("x1",pa.x);halo.setAttribute("y1",pa.y);halo.setAttribute("x2",pb.x);halo.setAttribute("y2",pb.y);
      halo.setAttribute("stroke",col);halo.setAttribute("stroke-width","6");halo.setAttribute("stroke-linecap","round");halo.setAttribute("opacity",".16");
      svg.appendChild(halo);
      const line=document.createElementNS(ns,"line");
      line.setAttribute("x1",pa.x);line.setAttribute("y1",pa.y);line.setAttribute("x2",pb.x);line.setAttribute("y2",pb.y);
      line.setAttribute("stroke",col);line.setAttribute("stroke-width","1.5");line.setAttribute("stroke-linecap","round");
      svg.appendChild(line);
    }else{
      const c=document.createElementNS(ns,"circle");
      c.setAttribute("cx",pa.x);c.setAttribute("cy",pa.y);c.setAttribute("r",9);
      c.setAttribute("fill","none");c.setAttribute("stroke",col);c.setAttribute("stroke-width","1.5");
      svg.appendChild(c);
    }
  });

  SIGNS.forEach((s,i)=>{
    const p=pos(i), on=lit.has(i);
    const txt=document.createElementNS(ns,"text");
    txt.setAttribute("x",p.x);txt.setAttribute("y",p.y);
    txt.setAttribute("text-anchor","middle");txt.setAttribute("dominant-baseline","central");
    txt.setAttribute("font-size",on?21:15);
    txt.setAttribute("fill",on?"var(--parch)":"#525b6e");
    txt.setAttribute("font-family","Fraunces, serif");
    txt.textContent=s.g; svg.appendChild(txt);
  });

  // centro: puntaje compuesto
  const big=document.createElementNS(ns,"text");
  big.setAttribute("x",cx);big.setAttribute("y",cy-4);big.setAttribute("text-anchor","middle");
  big.setAttribute("font-family","Fraunces, serif");big.setAttribute("font-size","42");big.setAttribute("fill",tTotal.col);
  big.textContent=comp.total; svg.appendChild(big);
  const lab=document.createElementNS(ns,"text");
  lab.setAttribute("x",cx);lab.setAttribute("y",cy+20);lab.setAttribute("text-anchor","middle");
  lab.setAttribute("font-family","IBM Plex Mono, monospace");lab.setAttribute("font-size","9.5");lab.setAttribute("letter-spacing","2");
  lab.setAttribute("fill","var(--gold)");lab.textContent=tTotal.label.toUpperCase(); svg.appendChild(lab);

  // leyenda
  document.getElementById("wheelLegend").innerHTML = layers.map(k=>
    `<span><i style="background:${LAYER_META[k].hex}"></i>${LAYER_META[k].label}</span>`).join("");
}

/* ============================================================
   RENDER
============================================================ */
function render(){
  const layers=activeLayers();
  const comp=composite({a:A,b:B},level);
  const t=tierOf(comp.total);

  // niveles activos
  document.querySelectorAll(".lvl").forEach(b=>b.classList.toggle("on",+b.dataset.lvl===level));

  // rails de cada persona según nivel
  ["a","b"].forEach(who=>{
    const cont=document.getElementById(who==="a"?"picksA":"picksB");
    cont.innerHTML="";
    layers.forEach(k=>{
      const meta=LAYER_META[k], st=(who==="a"?A:B)[k];
      const block=document.createElement("div"); block.className="layerpick";
      block.innerHTML=`<p class="ll"><span class="dot" style="background:${meta.hex}"></span> <b>${meta.label}</b> · ${meta.cap}</p>`;
      const rail=document.createElement("div"); rail.className="rail";
      SIGNS.forEach((s,i)=>{
        const btn=document.createElement("button");
        btn.className="glyph"+(i===st?" sel":"");
        btn.type="button";
        btn.innerHTML=`${s.g}<small>${s.n.slice(0,3).toUpperCase()}</small>`;
        btn.setAttribute("aria-label",`${meta.label} ${s.n}`);
        btn.addEventListener("click",()=>{ (who==="a"?A:B)[k]=i; render(); });
        rail.appendChild(btn);
      });
      block.appendChild(rail); cont.appendChild(block);
    });
  });

  // encabezados de persona = sus signos activos
  const head=(P)=> layers.map(k=>SIGNS[P[k]].g).join(" ");
  document.getElementById("pheadA").innerHTML = "Persona A &nbsp; "+head(A);
  document.getElementById("pheadB").innerHTML = "Persona B &nbsp; "+head(B);

  // título
  const lvlName = level===1?"El alma": level===2?"Alma y encuentro":"Alma, encuentro y deseo";
  document.getElementById("title").innerHTML =
    `${SIGNS[A.sol].n}<span class="x">×</span>${SIGNS[B.sol].n}<small>Nivel ${["","I","II","III"][level]} — ${lvlName}</small>`;

  // puntaje
  document.getElementById("scoreNum").textContent=comp.total;
  document.getElementById("scoreNum").style.color=t.col;
  const tw=document.getElementById("tier"); tw.textContent="— "+t.label; tw.style.color=t.col;
  const fill=document.getElementById("barFill"); fill.style.width=comp.total+"%"; fill.style.background=t.col;

  // desglose por capas (solo II y III)
  const lc=document.getElementById("layers");
  if(level===1){ lc.style.display="none"; lc.innerHTML=""; }
  else{
    lc.style.display="grid";
    lc.innerHTML=layers.map(k=>{
      const ia=A[k], ib=B[k], sc=atom(ia,ib), tt=tierOf(sc), m=LAYER_META[k];
      const asp=ASPECTS[dist(ia,ib)];
      return `<div class="lcard">
        <div class="lcap"><span class="dot" style="background:${m.hex}"></span>${m.label} · ${m.cap}</div>
        <div class="lscore" style="color:${tt.col}">${sc}</div>
        <div class="lasp">${SIGNS[ia].g} ${asp} ${SIGNS[ib].g}</div>
      </div>`;
    }).join("");
  }

  // cuerpo textual
  const body=document.getElementById("body");
  if(level===1){
    const r=R1[key(A.sol,B.sol)];
    body.innerHTML=`
      <div class="seg forces"><p class="stag">Las fortalezas</p><p>${r.f}</p></div>
      <div class="seg tensions"><p class="stag">Las tensiones</p><p>${r.t}</p></div>
      <div class="seg synth"><p class="stag">El veredicto de Selymna</p><p>« ${r.v} »</p></div>`;
  }else{
    // un párrafo por capa
    let html="";
    layers.forEach(k=>{
      const ia=A[k], ib=B[k], sc=atom(ia,ib), tt=tierOf(sc), m=LAYER_META[k];
      const seed=ia*12+ib;
      const frag=pick(FRAG[k][tt.k],seed);
      html+=`<div class="seg l-${k}"><p class="stag">${m.cap} · ${m.label}</p><p>${frag}</p></div>`;
    });
    const layerScores=layers.map(k=>({k,s:atom(A[k],B[k])}));
    const {sintesis,reco}=buildReco(layerScores);
    html+=`<div class="seg synth"><p class="stag">La síntesis de Selymna</p><p>« ${sintesis} »</p></div>`;
    html+=`<div class="seg reco"><p class="stag">La recomendación</p><p>${reco}</p></div>`;
    body.innerHTML=html;
  }

  // ── CTA Casa Selymna: ahora es un bandeau fijo en la parte superior (HTML estático) ──

  drawWheel();
}

/* ============================================================
   INIT
============================================================ */
document.querySelectorAll(".lvl").forEach(b=>{
  b.addEventListener("click",()=>{ level=+b.dataset.lvl; render(); });
});
render();
</script>
</body>
</html>
